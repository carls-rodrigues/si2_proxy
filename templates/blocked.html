<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Bloqueado — SI Proxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { color: #c0392b; font-size: 24px; margin-bottom: 16px; }
    .domain {
      background: #fdf2f2;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 8px 16px;
      color: #c0392b;
      font-family: monospace;
      font-size: 14px;
      margin: 16px auto;
      display: inline-block;
      word-break: break-all;
    }
    p { color: #555; line-height: 1.6; margin-top: 12px; font-size: 15px; }
    .back {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 24px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .back:hover { background: #2980b9; }
    .footer { margin-top: 32px; color: #bbb; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Acesso Bloqueado</h1>
    <div class="domain">{{domain}}</div>
    <p>Este site está na lista de domínios bloqueados.<br>Se você acredita que isso é um erro, entre em contato com o administrador da rede.</p>
    <a href="/" class="back">← Voltar ao Proxy</a>
    <div class="footer">SI Proxy — Sistemas para Internet 2 · FURG 2026/1</div>
  </div>
</body>
</html>
